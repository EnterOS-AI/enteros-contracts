# Schema-validation gate (RFC molecule-core#3285 §7: one check per invariant).
#
# Invariant enforced here: every `*/*.contract.json` instance (one per contract
# domain — mcp/, workspace-comms/, ...) MUST validate against its sibling
# `*/*.schema.json`. This is what makes a schema `const`/`enum`/`required` pin
# load-bearing in CI — e.g. renaming `required_tool` away from
# `provision_workspace` fails the mcp schema's `"const"` and this job goes red
# (the #3082 phantom-verb regression class), and a workspace-comms register
# response drifting off `status:"registered"` fails the same way. Fail-closed:
# any invalid instance OR any contract missing its schema is a non-zero exit.
name: validate-contracts

on:
  push:
    branches: [main]
  pull_request:

jobs:
  schema-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install check-jsonschema
        run: pip install --no-cache-dir check-jsonschema

      - name: Validate every */*.contract.json against its sibling schema
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          contracts=(*/*.contract.json)
          if [ ${#contracts[@]} -eq 0 ]; then
            echo "::error::no */*.contract.json instances found — nothing to validate (fail-closed)"
            exit 1
          fi
          rc=0
          for instance in "${contracts[@]}"; do
            schema="${instance%.contract.json}.schema.json"
            if [ ! -f "$schema" ]; then
              echo "::error file=$instance::missing sibling schema $schema (fail-closed)"
              rc=1
              continue
            fi
            echo "validating $instance  against  $schema"
            if ! check-jsonschema --schemafile "$schema" "$instance"; then
              echo "::error file=$instance::failed schema validation against $schema"
              rc=1
            fi
          done
          if [ "$rc" -ne 0 ]; then
            echo "::error::one or more contract instances failed schema validation"
            exit 1
          fi
          echo "all contract instances validate against their schemas"
